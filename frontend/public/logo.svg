<svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 120 120"
    width="120"
    height="120"
>

    <defs>

        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">

            <stop offset="0%" stop-color="#4F46E5"/>

            <stop offset="100%" stop-color="#06B6D4"/>

        </linearGradient>

    </defs>

    <!-- Outer Circle -->

    <circle
        cx="60"
        cy="60"
        r="48"
        fill="none"
        stroke="url(#gradient)"
        stroke-width="8"
    />

    <!-- Inner Circle -->

    <circle
        cx="60"
        cy="60"
        r="26"
        fill="none"
        stroke="url(#gradient)"
        stroke-width="6"
    />

    <!-- Center -->

    <circle
        cx="60"
        cy="60"
        r="8"
        fill="#06B6D4"
    />

    <!-- Check -->

    <path
        d="M44 63 L55 74 L80 48"
        fill="none"
        stroke="#10B981"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round"
    />

</svg>